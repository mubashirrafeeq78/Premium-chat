name: Setup NoorApp Flutter WebView

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: stable
          cache: true

      - name: Create Flutter Project
        run: |
          flutter create . --org com.noorapp.noorapp --overwrite

      - name: Install Dependencies
        run: |
          flutter pub add webview_flutter

      - name: Create WebView App Code
        run: |
          cat > lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';

          void main() {
            runApp(const NoorApp());
          }

          class NoorApp extends StatelessWidget {
            const NoorApp({super.key});

            @override
            Widget build(BuildContext context) {
              return const MaterialApp(
                debugShowCheckedModeBanner: false,
                home: WebViewScreen(),
              );
            }
          }

          class WebViewScreen extends StatefulWidget {
            const WebViewScreen({super.key});

            @override
            State<WebViewScreen> createState() => _WebViewScreenState();
          }

          class _WebViewScreenState extends State<WebViewScreen> {
            late final WebViewController controller;

            @override
            void initState() {
              super.initState();

              controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..loadRequest(
                  Uri.parse("https://lavenderblush-eagle-882875.hostingersite.com/chat_group.php"),
                );
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: SafeArea(
                  child: WebViewWidget(controller: controller),
                ),
              );
            }
          }
          EOF

      - name: Add Android Permissions
        run: |
          sed -i '/<manifest>/a \
          <uses-permission android:name="android.permission.INTERNET"/>\
          <uses-permission android:name="android.permission.CAMERA"/>\
          <uses-permission android:name="android.permission.RECORD_AUDIO"/>\
          <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>\
          <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>\
          ' android/app/src/main/AndroidManifest.xml

      - name: Get Packages
        run: flutter pub get

      - name: Commit & Push Changes
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add .
          git commit -m "Fix: Flutter WebView setup NoorApp"
          git push || echo "No changes to commit"
