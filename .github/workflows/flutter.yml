name: Build NoorApp APK

on:
push:
branches: [ "main" ]

jobs:
build:
runs-on: ubuntu-latest

steps:
  - name: Install Flutter
    uses: subosito/flutter-action@v2
    with:
      flutter-version: '3.19.0'

  - name: Create Flutter Project
    run: flutter create noor_app

  - name: Replace Main Code
    run: |
      cat > noor_app/lib/main.dart << 'EOF'
      import 'package:flutter/material.dart';
      import 'package:webview_flutter/webview_flutter.dart';
      import 'package:permission_handler/permission_handler.dart';

      void main() {
        runApp(const NoorApp());
      }

      class NoorApp extends StatelessWidget {
        const NoorApp({super.key});

        @override
        Widget build(BuildContext context) {
          return MaterialApp(
            debugShowCheckedModeBanner: false,
            title: 'NoorApp',
            home: const WebViewScreen(),
          );
        }
      }

      class WebViewScreen extends StatefulWidget {
        const WebViewScreen({super.key});

        @override
        State<WebViewScreen> createState() => _WebViewScreenState();
      }

      class _WebViewScreenState extends State<WebViewScreen> {
        late final WebViewController controller;

        @override
        void initState() {
          super.initState();
          requestPermissions();

          controller = WebViewController()
            ..setJavaScriptMode(JavaScriptMode.unrestricted)
            ..loadRequest(Uri.parse(
              "https://lavenderblush-eagle-882875.hostingersite.com/chat_group.php"
            ));
        }

        Future<void> requestPermissions() async {
          await [
            Permission.microphone,
            Permission.camera,
            Permission.storage,
          ].request();
        }

        @override
        Widget build(BuildContext context) {
          return Scaffold(
            body: SafeArea(
              child: WebViewWidget(controller: controller),
            ),
          );
        }
      }
      EOF

  - name: Add Dependencies
    run: |
      sed -i '/dependencies:/a\  webview_flutter: ^4.4.2\n  permission_handler: ^11.3.0' noor_app/pubspec.yaml

  - name: Add Android Permissions
    run: |
      sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <uses-permission android:name="android.permission.CAMERA"/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>' noor_app/android/app/src/main/AndroidManifest.xml

  - name: Build APK
    run: |
      cd noor_app
      flutter pub get
      flutter build apk --release

  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: NoorApp APK
      path: noor_app/build/app/outputs/flutter-apk/app-release.apk
