name: Build Android APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Clean and Install dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Build Optimized APK
        # --split-per-abi سائز چھوٹا رکھنے کے لیے الگ الگ فائلیں بنائے گا
        # ہم صرف ایک مخصوص پلیٹ فارم ٹارگٹ کر رہے ہیں تاکہ سائز مزید کم ہو
        run: flutter build apk --release --target-platform android-arm64 --split-per-abi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PremiumChat-APK
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
