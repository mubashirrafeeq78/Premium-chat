name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Force Fix and Build
        run: |
          # 1. کسی بھی پرانی یا ڈپلیکیٹ فائل کو زبردستی ختم کرنا
          rm -f android/app/build.gradle.kts
          rm -f android/build.gradle.kts
          rm -f android/settings.gradle.kts
          
          # 2. فلٹر کلین اور پب گیٹ
          flutter clean
          flutter pub get
          
          # 3. بلڈ شروع کرنا (تمام رکاوٹوں کو نظر انداز کر کے)
          flutter build apk --release --target-platform android-arm64 --split-per-abi --android-skip-build-dependency-validation
