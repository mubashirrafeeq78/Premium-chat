name: Build Android APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # خودکار طریقے سے Kotlin ورژن اپڈیٹ کرنے کی اسکرپٹ
      - name: Auto-fix Kotlin and Build versions
        run: |
          # build.gradle میں پرانے ورژن کو تلاش کر کے 2.1.0 سے بدلنا
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "2.1.0"/' android/build.gradle
          # اگر نئے فارمیٹ میں ہے تو وہاں بھی تبدیل کرنا
          sed -i 's/id "org.jetbrains.kotlin.android" version .*/id "org.jetbrains.kotlin.android" version "2.1.0" apply false/' android/settings.gradle

      - name: Clean and Get dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Build Optimized APK
        # یہاں ہم بائی پاس فلیگ بھی لگا رہے ہیں تاکہ معمولی وارننگ بلڈ نہ روکے
        run: flutter build apk --release --target-platform android-arm64 --split-per-abi --android-skip-build-dependency-validation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PremiumChat-APK
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
